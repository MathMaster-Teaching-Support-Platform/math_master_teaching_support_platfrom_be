events {
    worker_connections 1024;
}

http {
    upstream minio {
        server minio:9000;
    }

    server {
        listen 9000;
        server_name localhost;

        # Increase buffer sizes for large video files
        client_max_body_size 1000M;
        proxy_buffering off;
        proxy_request_buffering off;

        # Disable request/response buffering for streaming
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        # Forward all requests to MinIO
        location / {
            proxy_pass http://minio;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Support range requests for video streaming
            proxy_set_header Range $http_range;
            proxy_set_header If-Range $http_if_range;
            
            # CORS headers
            add_header Access-Control-Allow-Origin "http://localhost:3000" always;
            add_header Access-Control-Allow-Methods "GET, PUT, POST, DELETE, HEAD, OPTIONS" always;
            add_header Access-Control-Allow-Headers "*" always;
            add_header Access-Control-Expose-Headers "ETag, Content-Length, Content-Type" always;
            add_header Access-Control-Max-Age 3600 always;
            
            if ($request_method = 'OPTIONS') {
                return 204;
            }
        }
    }
}
