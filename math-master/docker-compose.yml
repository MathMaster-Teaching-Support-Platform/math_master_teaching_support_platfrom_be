  version: '3.8'

services:
  # Redis Service
  redis:
    image: redis:7-alpine
    container_name: math-master-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass redis_password
    volumes:
      - redis_data:/data
    networks:
      - math-master-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Centrifugo Service
  centrifugo:
    image: centrifugo/centrifugo:v5
    container_name: math-master-centrifugo
    ports:
      - "8000:8000"
    volumes:
      - ./centrifugo-config.json:/centrifugo/config.json
    command: centrifugo -c config.json
    networks:
      - math-master-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Ollama Service
  ollama:
    image: ollama/ollama:latest
    container_name: math-master-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - math-master-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
    # Uncomment the following lines if you have GPU support
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # Ollama Model Loader - pulls the llama3 model after Ollama starts
  # Note: llama3 requires at least 6GB RAM. If you have limited memory, use tinyllama instead
  ollama-pull:
    image: ollama/ollama:latest
    container_name: math-master-ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3}
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - math-master-network
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "Waiting for Ollama service to be ready..."
        sleep 10
        MODEL=$${OLLAMA_MODEL:-llama3}
        echo "Pulling $$MODEL model..."
        OLLAMA_HOST=http://ollama:11434 ollama pull $$MODEL
        echo "Model $$MODEL pulled successfully!"
    restart: "no"

networks:
  math-master-network:
    driver: bridge

volumes:
  redis_data:
    driver: local
  ollama_data:
    driver: local

