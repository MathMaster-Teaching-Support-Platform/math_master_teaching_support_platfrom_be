spring:
  datasource:
    url: jdbc:h2:mem:mathmaster_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect

  mail:
    host: localhost
    port: 25

logging:
  level:
    "[com.fptu.math_master]": DEBUG
    "[org.springframework.test]": INFO
